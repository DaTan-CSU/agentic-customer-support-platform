name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All checks run without any provider credentials — the unit tests only do
# static file assertions, and `tsc --noEmit` doesn't talk to the network.
# That keeps CI runnable on forks without secret distribution.
jobs:
  backend:
    name: backend / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-backend/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s . -p 'test_*.py' -v

  frontend:
    name: frontend / tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit
